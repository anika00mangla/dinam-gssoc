# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: "Be concise. Flag only real bugs, security issues, and clear logic errors. Skip style nits covered by ESLint/Prettier."

reviews:
  profile: "chill"
  poem: false
  high_level_summary: true
  high_level_summary_placeholder: ""
  review_status: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "master"

  path_filters:
    - "!dist/**"
    - "!node_modules/**"
    - "!package-lock.json"
    - "!public/**"
    - "!**/*.snap"
    - "!**/*.lock"

  path_instructions:
    - path: "src/**/*.ts"
      instructions: "Focus on type safety, null handling, and logic errors only."
    - path: "src/**/*.tsx"
      instructions: "Flag accessibility issues and React anti-patterns only. Skip style comments."
    - path: "src/**/*.css"
      instructions: "Skip unless there is a clear bug."

chat:
  auto_reply: false
